# ====================================================
# Deploy Static Content to GitHub Pages
# The Gilded Atlas - CI/CD Pipeline
# ====================================================

name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------------
      # Step 1: Checkout repository
      # ---------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------
      # Step 2: Verify index.html exists (Required Check Step)
      # ---------------------------------------------
      - name: Verify index.html exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "Error: index.html not found!"
            exit 1
          fi
          echo "index.html found. Proceeding to deployment."

      # ---------------------------------------------
      # Step 3: Configure GitHub Pages
      # ---------------------------------------------
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ---------------------------------------------
      # Step 4: Upload repository as deployment artifact
      # ---------------------------------------------
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      # ---------------------------------------------
      # Step 5: Deploy to GitHub Pages
      # ---------------------------------------------
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4